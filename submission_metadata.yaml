# ── Approach summary (≤200 words) ────────────────────────────────────────────
methodology_summary: |
  A transparent, offline 4-stage funnel. Stage 1 streams all 100k candidates and
  computes a trust-aware STRUCTURED pre-score (skills weighted by endorsement/
  duration/proficiency consistency, career trajectory, experience) so keyword
  density never drives recall — keyword-stuffers and honeypots cannot crowd the
  shortlist. Stage 2 keeps the top ~2,000. Stage 3 reranks them with hybrid BM25 +
  semantic (TF-IDF by default; optional precomputed BGE). Stage 4 fuses the signals,
  applies a behavioural multiplier from the 23 Redrob signals, penalises the JD's
  explicit disqualifiers (services-only, research-only, framework-only, job-hopping),
  rescues plain-language Tier-5 product builders, and floors honeypots out of the
  top-100. Every pick ships an evidence-cited, hallucination-checked reason. We built
  a labelled synthetic harness (real schema, tiers 0-5, all four trap types) to
  measure the official composite locally and an adversarial honeypot loop to probe
  the detector. Runs in ~80s on CPU, <2.5 GB, fully offline. Optional LambdaMART
  (NDCG-optimised) and cross-encoder reranking are provided as opt-in refinements.

